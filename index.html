<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South Shields Metro Times</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #predicted-departure {
            background: #3498db; color: white; padding: 20px; border-radius: 8px; 
            margin: 20px 0; font-size: 2em; text-align: center;
        }
        .card { 
            background: #f5f5f5; padding: 20px; border-radius: 8px; margin: 20px 0;
            max-width: 600px; margin-left: auto; margin-right: auto;
        }
        .service-analysis { 
            background: #fff; border: 2px solid #3498db; border-radius: 8px; 
            padding: 24px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }
        .service-analysis h2 { 
            margin: 0 0 16px 0; color: #2c3e50; font-size: 1.5em; 
            display: flex; align-items: center; gap: 10px; 
        }
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .status-good { background-color: #1b5e20; }
        .status-warning { background-color: #f39c12; }
        .status-error { background-color: #e74c3c; }
        .status-info { background-color: #1565c0; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .refresh-btn { background: #1565c0; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin: 10px auto; display: block; }
        .refresh-btn:disabled { background: #bdc3c7; }
        .analysis-content { color: #2c3e50; line-height: 1.6; font-size: 1.2em; font-weight: 500; }
        .analysis-timestamp { color: #7f8c8d; font-size: 0.9em; margin-top: 12px; padding-top: 12px; border-top: 1px solid #ecf0f1; }
        #scheduled-times { font-size: 1.4em; line-height: 1.8; }
        .static-note { 
            background: #fff3cd; border: 1px solid #ffeaa7; border-radius: 8px; 
            padding: 16px; margin-top: 20px; font-size: 0.95em; color: #856404; 
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">South Shields Metro Departures</h1>
    
    <div id="predicted-departure" style="background: #1565c0">Predicted next departure time: <span id="prediction-time" aria-live="polite">Loading...</span></div>
    <button id="refresh-btn" class="refresh-btn" onclick="updateAll()">Refresh Live Times</button>
    <div class="card">
        <h2>Next Scheduled Times</h2>
        <div id="scheduled-times">Loading...</div>
    </div>
    <div class="service-analysis">
        <h2><span class="status-indicator status-info" id="statusIndicator" role="img" aria-label="Status"></span>Next scheduled Departure:</h2>
        <div id="analysisContent" class="analysis-content" aria-live="polite">Loading...</div>
        <div class="analysis-timestamp" id="analysisTimestamp"></div>
    </div>
    
    <div class="static-note">
        <strong>Live data:</strong> Via Cloudflare Worker proxy. Falls back to static schedule if unavailable. Auto-refreshes every 15s.
    </div>

    <script>
        // YOUR CLOUDFLARE WORKER
        const PROXY_BASE = 'https://metro-proxy.colinpattinson1986.workers.dev';
        
        // Timetable data
        const schedules = {
            weekday: {5:[44,56],6:[8,20,32,44,56],7:[8,20,32,44,56],8:[8,20,32,44,56],9:[8,20,32,44,56],10:[8,20,32,44,56],11:[8,20,32,44,56],12:[8,20,32,44,56],13:[8,20,32,44,56],14:[8,20,32,44,56],15:[8,20,30,44,56],16:[8,20,32,44,56],17:[8,20,32,44,56],18:[11,26,35,41,56],19:[11,26,41,56],20:[11,26,41,56],21:[11,26,41,56],22:[11,26,41,56],23:[11,26,41,56]},
            saturday: {6:[56],7:[26,56],8:[26,56],9:[26,56],10:[11,26,41,56],11:[11,26,41,56],12:[11,26,41,56],13:[11,26,41,56],14:[11,26,41,56],15:[11,26,41,56],16:[11,26,41,56],17:[11,26,41,56],18:[11,26,41,56],19:[11,26,41,56],20:[11,26,41,56],21:[11,26,41,56],22:[11,26,41,56],23:[11,26,41,56]},
            sunday: {6:[56],7:[26,56],8:[26,56],9:[26,56],10:[11,26,41,56],11:[11,26,41,56],12:[11,26,41,56],13:[11,26,41,56],14:[11,26,41,56],15:[11,26,41,56],16:[11,26,41,56],17:[11,26,41,56],18:[11,26,41,56],19:[11,26,41,56],20:[11,26,41,56],21:[11,26,41,56],22:[11,26,41,56],23:[11,26,41,56]}
        };

        function getScheduleForDay() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            return dayOfWeek === 0 ? schedules.sunday : dayOfWeek === 6 ? schedules.saturday : schedules.weekday;
        }

        function getNextScheduledTimes() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const schedule = getScheduleForDay();
            let upcomingTimes = [];
            if (schedule[currentHour]) {
                const validMinutes = schedule[currentHour].filter(m => m > currentMinute);
                upcomingTimes.push(...validMinutes.map(m => ({hour: currentHour, minute: m})));
            }
            let hour = currentHour + 1;
            while (upcomingTimes.length < 4 && hour <= 23) {
                if (schedule[hour]) {
                    upcomingTimes.push(...schedule[hour].map(m => ({hour: hour, minute: m})));
                }
                hour++;
            }
            return upcomingTimes.slice(0, 4);
        }

        function displayScheduledTimes() {
            const nextTimes = getNextScheduledTimes();
            const list = nextTimes.map(t => `<li>${t.hour.toString().padStart(2,'0')}:${t.minute.toString().padStart(2,'0')}</li>`).join('');
            document.getElementById('scheduled-times').innerHTML = nextTimes.length ? `<ul style="list-style:none;padding:0;margin:0">${list}</ul>` : 'No more departures';
        }

        async function fetchLiveData(endpoint) {
            try {
                const response = await fetch(`${PROXY_BASE}${endpoint}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.warn(`Live API failed (${endpoint}): ${error.message}`);
                return null;
            }
        }

        async function fetchPrediction() {
            const data = await fetchLiveData('/api/times/CHI/2');
            const span = document.getElementById('prediction-time');
            if (data && data.length > 0) {
                const predictedTime = new Date(Date.now() + (data[0].dueIn - 2) * 60000);
                const timeStr = `${predictedTime.getHours().toString().padStart(2,'0')}:${predictedTime.getMinutes().toString().padStart(2,'0')}`;
                span.innerHTML = `${timeStr} <span class="sr-only">(Live)</span>`;
                span.parentElement.style.background = '#1b5e20';
            } else {
                const next = getNextScheduledTimes()[0];
                const timeStr = next ? `${next.hour.toString().padStart(2,'0')}:${next.minute.toString().padStart(2,'0')}` : 'No departures';
                span.innerHTML = `${timeStr} <span class="sr-only">(Scheduled)</span>`;
                span.parentElement.style.background = '#1565c0';
            }
        }

        function analyzeService() {
            const next = getNextScheduledTimes()[0];
            const content = document.getElementById('analysisContent'), indicator = document.getElementById('statusIndicator');
            if (!next) {
                content.textContent = 'Service ended.';
                indicator.setAttribute('aria-label', 'Service ended');
            } else {
                const mins = next.hour * 60 + next.minute - (new Date().getHours() * 60 + new Date().getMinutes());
                const due = mins <= 0 ? 'Due now' : `${mins} min${mins===1?'':'s'}`;
                content.textContent = `${next.hour.toString().padStart(2,'0')}:${next.minute.toString().padStart(2,'0')} (${due})`;
                indicator.setAttribute('aria-label', `Next departure in ${due}`);
            }
            document.getElementById('analysisTimestamp').textContent = `Updated: ${new Date().toLocaleTimeString('en-GB')}`;
        }

        async function updateAll() {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true; btn.textContent = 'Refreshing...';
            try { displayScheduledTimes(); await fetchPrediction(); analyzeService(); }
            finally { btn.disabled = false; btn.textContent = 'Refresh Live Times'; }
        }
        
        updateAll();
        setInterval(updateAll, 15000);
    </script>
</body>
</html>
