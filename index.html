<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South Shields Metro Times</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #predicted-departure {
            background: #3498db; color: white; padding: 20px; border-radius: 8px; 
            margin: 20px 0; font-size: 2em; text-align: center;
        }
        .card { 
            background: #f5f5f5; padding: 20px; border-radius: 8px; margin: 20px 0;
            max-width: 600px; margin-left: auto; margin-right: auto;
        }
        .service-analysis { 
            background: #fff; border: 2px solid #3498db; border-radius: 8px; 
            padding: 24px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
        }
        .service-analysis h2 { 
            margin: 0 0 16px 0; color: #2c3e50; font-size: 1.5em; 
            display: flex; align-items: center; gap: 10px; 
        }
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .status-good { background-color: #27ae60; }
        .status-warning { background-color: #f39c12; }
        .status-error { background-color: #e74c3c; }
        .status-info { background-color: #3498db; }
        .analysis-content { color: #2c3e50; line-height: 1.6; font-size: 1.2em; font-weight: 500; }
        .analysis-timestamp { color: #7f8c8d; font-size: 0.9em; margin-top: 12px; padding-top: 12px; border-top: 1px solid #ecf0f1; }
        #scheduled-times { font-size: 1.4em; line-height: 1.8; }
        .static-note { 
            background: #fff3cd; border: 1px solid #ffeaa7; border-radius: 8px; 
            padding: 16px; margin-top: 20px; font-size: 0.95em; color: #856404; 
            text-align: center;
        }
        #refresh-button {
            background: none; border: none; cursor: pointer; font-size: 0.8em;
            vertical-align: middle; margin-left: 10px; color: #3498db;
            transition: transform 0.2s, color 0.2s; padding: 5px; border-radius: 50%;
        }
        #refresh-button:hover { color: #2980b9; background: rgba(52, 152, 219, 0.1); }
        #refresh-button:focus { outline: 2px solid #3498db; outline-offset: 2px; }
        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1 style="text-align: center;">
        South Shields Metro Departures
        <button id="refresh-button" aria-label="Refresh departures" title="Refresh departures">↻</button>
    </h1>
    
    <div id="predicted-departure">Predicted next departure time: <span id="prediction-time" aria-live="polite">Loading...</span></div>
    
    <div class="card">
        <h2>Next Scheduled Times</h2>
        <div id="scheduled-times" aria-live="polite">Loading...</div>
    </div>
    
    <div class="service-analysis">
        <h2><span class="status-indicator status-info" id="statusIndicator" role="img" aria-label="Service status indicator"></span>Next scheduled Departure:</h2>
        <div id="analysisContent" class="analysis-content" aria-live="polite">Loading...</div>
        <div class="analysis-timestamp" id="analysisTimestamp"></div>
    </div>
    
    <div class="static-note">
        <strong>Live data:</strong> Via Cloudflare Worker proxy. Falls back to static schedule if unavailable. Auto-refreshes every 15s.
    </div>

    <script>
        // YOUR CLOUDFLARE WORKER
        const PROXY_BASE = 'https://metro-proxy.colinpattinson1986.workers.dev';
        
        // Timetable data
        const schedules = {
            weekday: {5:[44,56],6:[8,20,32,44,56],7:[8,20,32,44,56],8:[8,20,32,44,56],9:[8,20,32,44,56],10:[8,20,32,44,56],11:[8,20,32,44,56],12:[8,20,32,44,56],13:[8,20,32,44,56],14:[8,20,32,44,56],15:[8,20,30,44,56],16:[8,20,32,44,56],17:[8,20,32,44,56],18:[11,26,35,41,56],19:[11,26,41,56],20:[11,26,41,56],21:[11,26,41,56],22:[11,26,41,56],23:[11,26,41,56]},
            saturday: {6:[56],7:[26,56],8:[26,56],9:[26,56],10:[11,26,41,56],11:[11,26,41,56],12:[11,26,41,56],13:[11,26,41,56],14:[11,26,41,56],15:[11,26,41,56],16:[11,26,41,56],17:[11,26,41,56],18:[11,26,41,56],19:[11,26,41,56],20:[11,26,41,56],21:[11,26,41,56],22:[11,26,41,56],23:[11,26,41,56]},
            sunday: {6:[56],7:[26,56],8:[26,56],9:[26,56],10:[11,26,41,56],11:[11,26,41,56],12:[11,26,41,56],13:[11,26,41,56],14:[11,26,41,56],15:[11,26,41,56],16:[11,26,41,56],17:[11,26,41,56],18:[11,26,41,56],19:[11,26,41,56],20:[11,26,41,56],21:[11,26,41,56],22:[11,26,41,56],23:[11,26,41,56]}
        };

        function getScheduleForDay() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            return dayOfWeek === 0 ? schedules.sunday : dayOfWeek === 6 ? schedules.saturday : schedules.weekday;
        }

        function getNextScheduledTimes() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const schedule = getScheduleForDay();
            let upcomingTimes = [];
            if (schedule[currentHour]) {
                const validMinutes = schedule[currentHour].filter(m => m > currentMinute);
                upcomingTimes.push(...validMinutes.map(m => ({hour: currentHour, minute: m})));
            }
            let hour = currentHour + 1;
            while (upcomingTimes.length < 4 && hour <= 23) {
                if (schedule[hour]) {
                    upcomingTimes.push(...schedule[hour].map(m => ({hour: hour, minute: m})));
                }
                hour++;
            }
            return upcomingTimes.slice(0, 4);
        }

        function displayScheduledTimes() {
            const scheduledDiv = document.getElementById('scheduled-times');
            const nextTimes = getNextScheduledTimes();
            scheduledDiv.innerHTML = nextTimes.length > 0 
                ? nextTimes.map(t => `${t.hour.toString().padStart(2,'0')}:${t.minute.toString().padStart(2,'0')}`).join('<br>')
                : 'No more scheduled departures today';
        }

        async function fetchLiveData(endpoint) {
            try {
                const response = await fetch(`${PROXY_BASE}${endpoint}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.warn(`Live API failed (${endpoint}): ${error.message}`);
                return null;
            }
        }

        async function fetchPrediction() {
            const data = await fetchLiveData('/api/times/CHI/2');
            const predictionSpan = document.getElementById('prediction-time');
            
            if (data && data.length > 0) {
                const now = new Date();
                const predictedTime = new Date(now.getTime() + (data[0].dueIn - 2) * 60000);
                predictionSpan.textContent = `${predictedTime.getHours().toString().padStart(2,'0')}:${predictedTime.getMinutes().toString().padStart(2,'0')}`;
                predictionSpan.parentElement.style.background = '#27ae60'; // Green when live
            } else {
                const nextTimes = getNextScheduledTimes();
                predictionSpan.textContent = nextTimes.length > 0 
                    ? `${nextTimes[0].hour.toString().padStart(2,'0')}:${nextTimes[0].minute.toString().padStart(2,'0')}`
                    : 'No departures';
                predictionSpan.parentElement.style.background = '#3498db'; // Blue when static
            }
        }

        function analyzeService() {
            const now = new Date();
            const nextScheduled = getNextScheduledTimes();
            const analysisContent = document.getElementById('analysisContent');
            const statusIndicator = document.getElementById('statusIndicator');
            const timestampDiv = document.getElementById('analysisTimestamp');

            if (nextScheduled.length === 0) {
                analysisContent.textContent = 'Service has ended for the day.';
                statusIndicator.className = 'status-indicator status-info';
            } else {
                const next = nextScheduled[0];
                const minsUntil = next.hour * 60 + next.minute - (now.getHours() * 60 + now.getMinutes());
                analysisContent.textContent = `${next.hour.toString().padStart(2,'0')}:${next.minute.toString().padStart(2,'0')} (${minsUntil} mins)`;
                statusIndicator.className = 'status-indicator status-info';
            }
            
            timestampDiv.textContent = `Updated: ${now.toLocaleTimeString('en-GB')}`;
        }

        // Load everything
        async function updateAll() {
            const btn = document.getElementById('refresh-button');
            if (btn) btn.classList.add('spinning');
            try {
                displayScheduledTimes();
                await fetchPrediction();
                analyzeService();
            } finally {
                if (btn) btn.classList.remove('spinning');
            }
        }
        
        document.getElementById('refresh-button').addEventListener('click', updateAll);
        updateAll();
        setInterval(updateAll, 15000);
    </script>
</body>
</html>
