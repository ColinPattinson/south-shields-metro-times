<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South Shields Metro Times</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #predicted-departure {
            background: #3498db;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 2em;
            text-align: center;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .card {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        
        /* Service Analysis Section */
        .service-analysis {
            background: #fff;
            border: 2px solid #3498db;
            border-radius: 8px;
            padding: 24px;
            margin-top: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .service-analysis h2 {
            margin: 0 0 16px 0;
            color: #2c3e50;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-info { background-color: #3498db; }
        
        .analysis-content {
            color: #2c3e50;
            line-height: 1.6;
            font-size: 1em;
        }
        
        .analysis-timestamp {
            color: #7f8c8d;
            font-size: 0.85em;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #ecf0f1;
        }

        /* Static note */
        .static-note {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 16px;
            margin-top: 40px;
            font-size: 0.95em;
            color: #856404;
        }
    </style>
</head>
<body>
    <h1>South Shields Metro Departures</h1>
    <div id="predicted-departure">
        Predicted next departure time: <span id="prediction-time">Calculating...</span>
    </div>
    <div class="container">
        <div class="card">
            <h2>Next Scheduled Times</h2>
            <div id="scheduled-times">Loading...</div>
        </div>
        <div class="card">
            <h2>Next scheduled Departure:</h2>
            <div id="analysisContent" class="analysis-content">Analyzing service...</div>
            <div class="analysis-timestamp" id="analysisTimestamp"></div>
        </div>
    </div>

    <!-- Static note -->
    <div class="static-note">
        <strong>Note:</strong> After recent API changes, this page is now static and must be refreshed for updated times.
    </div>

    <script>
        // Complete Nexus timetable data for Platform 2
        const schedules = {
            weekday: {
                5: [44,56],
                6: [8,20,32,44,56],
                7: [8,20,32,44,56],
                8: [8,20,32,44,56],
                9: [8,20,32,44,56],
                10: [8,20,32,44,56],
                11: [8,20,32,44,56],
                12: [8,20,32,44,56],
                13: [8,20,32,44,56],
                14: [8,20,32,44,56],
                15: [8,20,30,44,56],
                16: [8,20,32,44,56],
                17: [8,20,32,44,56],
                18: [11,26,35,41,56],
                19: [11,26,41,56],
                20: [11,26,41,56],
                21: [11,26,41,56],
                22: [11,26,41,56],
                23: [11,26,41,56]
            },
            saturday: {
                6: [56],
                7: [26,56],
                8: [26,56],
                9: [26,56],
                10: [11,26,41,56],
                11: [11,26,41,56],
                12: [11,26,41,56],
                13: [11,26,41,56],
                14: [11,26,41,56],
                15: [11,26,41,56],
                16: [11,26,41,56],
                17: [11,26,41,56],
                18: [11,26,41,56],
                19: [11,26,41,56],
                20: [11,26,41,56],
                21: [11,26,41,56],
                22: [11,26,41,56],
                23: [11,26,41,56]
            },
            sunday: {
                6: [56],
                7: [26,56],
                8: [26,56],
                9: [26,56],
                10: [11,26,41,56],
                11: [11,26,41,56],
                12: [11,26,41,56],
                13: [11,26,41,56],
                14: [11,26,41,56],
                15: [11,26,41,56],
                16: [11,26,41,56],
                17: [11,26,41,56],
                18: [11,26,41,56],
                19: [11,26,41,56],
                20: [11,26,41,56],
                21: [11,26,41,56],
                22: [11,26,41,56],
                23: [11,26,41,56]
            }
        };

        function getScheduleForDay() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            if (dayOfWeek === 0) return schedules.sunday;
            if (dayOfWeek === 6) return schedules.saturday;
            return schedules.weekday;
        }

        function getNextScheduledTimes() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const schedule = getScheduleForDay();
            
            let upcomingTimes = [];
            
            // Check current hour first
            if (schedule[currentHour]) {
                const validMinutes = schedule[currentHour].filter(m => m > currentMinute);
                upcomingTimes.push(...validMinutes.map(m => ({
                    hour: currentHour,
                    minute: m
                })));
            }
            
            // Check subsequent hours if needed
            let hour = currentHour + 1;
            while (upcomingTimes.length < 4 && hour <= 23) {
                if (schedule[hour]) {
                    upcomingTimes.push(...schedule[hour].map(m => ({
                        hour: hour,
                        minute: m
                    })));
                }
                hour++;
            }
            
            return upcomingTimes.slice(0, 4);
        }

        function displayScheduledTimes() {
            const scheduledDiv = document.getElementById('scheduled-times');
            const nextTimes = getNextScheduledTimes();
            
            if (nextTimes.length === 0) {
                scheduledDiv.innerHTML = 'No more scheduled departures today';
                return;
            }
            
            scheduledDiv.innerHTML = nextTimes
                .map(time => 
                    `${time.hour.toString().padStart(2, '0')}:${time.minute.toString().padStart(2, '0')}`
                ).join('<br>');
        }

        function displayPredictedDeparture() {
            const nextTimes = getNextScheduledTimes();
            const predictionSpan = document.getElementById('prediction-time');
            
            if (nextTimes.length === 0) {
                predictionSpan.textContent = 'No more departures today';
            } else {
                const next = nextTimes[0];
                predictionSpan.textContent = 
                    `${next.hour.toString().padStart(2, '0')}:${next.minute.toString().padStart(2, '0')}`;
            }
        }

        function analyzeService() {
            const now = new Date();
            const nextScheduled = getNextScheduledTimes();
            const dayType = now.getDay() === 0 ? 'Sunday' : (now.getDay() === 6 ? 'Saturday' : 'Weekday');
            
            const analysisContent = document.getElementById('analysisContent');
            const statusIndicator = document.getElementById('statusIndicator');
            const timestampDiv = document.getElementById('analysisTimestamp');

            if (nextScheduled.length === 0) {
                analysisContent.innerHTML = `Service has ended for the day (${dayType} schedule).`;
                statusIndicator.className = 'status-indicator status-info';
            } else {
                const next = nextScheduled[0];
                const minsUntil = next.hour * 60 + next.minute - (now.getHours() * 60 + now.getMinutes());
                analysisContent.innerHTML = `Next scheduled departure at ${next.hour.toString().padStart(2, '0')}:${next.minute.toString().padStart(2, '0')} (${minsUntil} minutes away).`;
                statusIndicator.className = 'status-indicator status-info';
            }

            timestampDiv.textContent = `Analysis updated: ${now.toLocaleTimeString('en-GB')}`;
        }

        // Initial load (all static)
        displayScheduledTimes();
        displayPredictedDeparture();
        analyzeService();
    </script>
</body>
</html>
